title: Suspicious SSH Login Using Weak or Default Credentials
id: hb-ssh-weak-credential-success
status: experimental
description: Detects successful SSH logins using commonly abused weak or default credentials in Cowrie-style logs.
author: kali
date: 2026-03-29
logsource:
  product: linux
  service: ssh
detection:
  selection_event:
    eventid: cowrie.login.success
  selection_user_root:
    username: root
  selection_user_admin:
    username: admin
  selection_pass_toor:
    password: toor
  selection_pass_admin:
    password: admin
  condition: selection_event and (
              (selection_user_root and selection_pass_toor) or
              (selection_user_admin and selection_pass_admin)
            )
fields:
  - timestamp
  - src_ip
  - username
  - password
  - session
  - protocol
level: high
falsepositives:
  - Lab environments using intentionally weak credentials
  - Controlled honeypot testing
tags:
  - attack.initial_access
  - attack.valid_accounts
  - attack.t1078
